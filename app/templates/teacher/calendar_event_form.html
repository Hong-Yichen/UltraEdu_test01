{% extends "base.html" %}
{% block title %}{{ 'Edit Event' if event else 'New Event' }} — UltraEdu{% endblock %}
{% block content %}
<h1>{{ 'Edit Event' if event else 'New Calendar Event' }}</h1>
<form method="post" class="form-card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" value="{{ event.title if event else '' }}" required>
  </div>
  <div class="field">
    <label for="event_type">Type</label>
    <select id="event_type" name="event_type">
      {% for t in event_types %}
      <option value="{{ t }}" {% if (event.event_type if event else 'school_event') == t %}selected{% endif %}>{{ t|label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="start_date">Start date</label>
    <input type="date" id="start_date" name="start_date" value="{{ event.start_date.isoformat() if event else default_date }}" required>
  </div>
  <div class="field">
    <label for="end_date">End date (optional — leave blank for a single-day event)</label>
    <input type="date" id="end_date" name="end_date" value="{{ event.end_date.isoformat() if event and event.end_date != event.start_date else '' }}">
  </div>
  <div class="field">
    <label for="class_group_id">Class (optional — leave blank for school-wide)</label>
    <select id="class_group_id" name="class_group_id">
      <option value="">— School-wide —</option>
      {% for c in classes %}
      <option value="{{ c.id }}" {% if event and event.class_group_id == c.id %}selected{% endif %}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="3">{{ event.description or '' if event else '' }}</textarea>
  </div>
  <button type="submit" class="btn-primary">{{ 'Save changes' if event else 'Add to calendar' }}</button>
</form>

{% if event %}
<form method="post" action="{{ url_for('teacher.calendar_event_delete', event_id=event.id) }}"
      onsubmit="return confirm('Remove this event from the calendar?');" style="margin-top: 1rem;">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <button type="submit" class="btn-danger">Delete event</button>
</form>
{% endif %}
{% endblock %}
