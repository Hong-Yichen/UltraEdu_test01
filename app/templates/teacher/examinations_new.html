{% extends "base.html" %}
{% block title %}New Examination — UltraEdu{% endblock %}
{% block content %}
<h1>New Examination</h1>
<p class="muted">AI hints are always off for examinations, and Exam Mode turns on automatically as soon as you publish.</p>
<form method="post" class="form-card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="field">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" required>
  </div>
  <div class="field">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="3"></textarea>
  </div>
  <div class="field">
    <label for="class_group_id">Class</label>
    <select id="class_group_id" name="class_group_id" required>
      {% for c in classes %}
      <option value="{{ c.id }}">{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="worksheet_id">Worksheet (optional — leave blank for a file-upload examination)</label>
    <select id="worksheet_id" name="worksheet_id">
      <option value="">— None (file upload) —</option>
      {% for w in worksheets %}
      <option value="{{ w.id }}">{{ w.title }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="difficulty">Difficulty</label>
    <select id="difficulty" name="difficulty">
      {% for d in difficulties %}
      <option value="{{ d }}" {% if d == 'medium' %}selected{% endif %}>{{ d|label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="due_date">Due date / time</label>
    <input type="datetime-local" id="due_date" name="due_date">
  </div>
  <div class="field">
    <label for="max_score">Max score</label>
    <input type="number" id="max_score" name="max_score" value="10" min="0">
  </div>
  <button type="submit" class="btn-primary">Create examination</button>
</form>
{% endblock %}
