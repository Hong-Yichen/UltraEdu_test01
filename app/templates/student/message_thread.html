{% extends "base.html" %}
{% block title %}{{ other_party.full_name }} — Messages — UltraEdu{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
{% endblock %}
{% block content %}
<p><a href="{{ url_for('student.messages_list') }}">‹ All messages</a></p>
<div id="chat-root" class="chat-shell" data-conversation-id="{{ conversation.id }}" data-current-user-id="{{ current_user.id }}">
  <div class="chat-header">💬 {{ other_party.full_name }} <span class="muted" style="color: rgba(255,255,255,0.85); font-weight:400;">· Teacher</span></div>
  <div id="chat-messages" class="chat-messages"></div>
  <form id="chat-form" class="chat-form">
    <textarea id="chat-input" placeholder="Ask a question…" required></textarea>
    <button type="submit">Send</button>
  </form>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
